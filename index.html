<!DOCTYPE html>
<html>
<head>
  <title>Rocko Sound Page</title>
  <style>
     body {
     margin: 0;
     height: 100vh;
     display: flex;
     justify-content: center;
     align-items: center;
     background:
     linear-gradient(rgba(0,0,0,0.35), rgba(0,0,0,0.35)),
     url("Kitty.png");
     background-size: cover;
     background-position: center;
     background-repeat: no-repeat;
     font-family: Arial, sans-serif;
    }

    .container {
      text-align: center;
    }

    img {
      width: 500px;
      height: auto;
      display: block;
      margin: 0 auto 20px auto;
      border-radius: 12px;
    }

    button {
      padding: 12px 24px;
      font-size: 18px;
      cursor: pointer;
      border: none;
      border-radius: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="Rocko Face.png" alt="Rocko">
    <button onclick="playSound()">Play Sound</button>

    <audio id="mySound" src="raise-a-floppa-meow.mp3"></audio>
  </div>

  <script>
    function playSound() {
      document.getElementById("mySound").play();
    }
  </script>
</body>
</html>
