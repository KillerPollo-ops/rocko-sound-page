<!DOCTYPE html>
<html>
<head>
  <title>Rocko Sound Page</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <img src="Rocko Face.png" alt="Rocko">
    <button onclick="playSound()">Play Sound</button>
    <audio id="mySound" src="raise-a-floppa-meow.mp3"></audio>
  </div>

  <script>
    function playSound() {
      document.getElementById("mySound").play();
    }
  </script>
</body>
</html>
